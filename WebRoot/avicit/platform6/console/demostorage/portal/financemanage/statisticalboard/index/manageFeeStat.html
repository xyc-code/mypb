<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <script src="js/echarts.min.js"></script>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>管理费用统计</title>
    <style>
        .manageFeeStat-content {
          background: #fff;
          height: 370px;
        }
        .manageFeeStat-content > p{
          display: inline-block;
        }
        .manageFeeStat-content > p > span:nth-child(1) {
          text-align: left;
          font-weight: 600;
          font-style: normal;
          font-size: 16px;
          color: #1e1e1e;
        }
        .manageFeeStat-content > div{
          float: right;
          font-weight: 600;
          color:#7F7F7F;
          font-size: 16px;
        }
        .manageFeeStat-tab{
          position: absolute;
          right: 20px;
          top: 75px;
        }
        .manageFeeStat-tab > span{
            display: inline-block;
            border: 1px solid #D9D9D9;
            width: 50px;
            text-align: center;
            margin-left: -7px;
            height: 25px;
            line-height: 25px;
            color: #676767;
            font-size: 12px;
            font-weight: 500;
        }
        .manageFeeStat-tab > span:nth-last-child(2){
            border-left: none;
            border-right: none;
        }
        .manageFeeStat-active{
            color:#3F80F2 !important;
            border: 1px solid #3F80F2 !important;
        }
      </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
      <h4>管理费用统计</h4>
      <span class="box_title_right">
        <i
        class="iconfont icon-refresh"
        title="刷新"
        ></i>
      </span>
      </div>
      <div class="manageFeeStat-content content_inner">
        <div id="manageFeeStatPie" style="width: 100%;height: 100%;"></div>
      </div>
    </div>
    <script type="text/javascript">
      var manageFeeStatEchart = echarts.init(document.getElementById("manageFeeStatPie"));

      var manageFeeStatOption = {
        tooltip: {
          trigger: 'axis'
        },
        grid: {
        	top:'5%',
          left: '55',
          right:'3%',
          bottom:'20%',
        },
        color:['#3F80F2','#C2D9FF'],
        legend: {
          icon: "circle",
          bottom: '20px',
          left: 'center',
          itemWidth: 10,  // 设置宽度
          itemHeight: 10, // 设置高度
          itemGap: 5, 
          data: ['本期', '上期']
        },
        xAxis: [
            {
                type: 'category',
                data: ['2016', '2017', '2018', '2019', '2020', '2021' ]
            }
        ],
        yAxis: [
            {
                type: 'value'
            }
        ],
        series: [
            {
                name: '本期',
                type: 'bar',
                data: [988, 2140, 3581, 1598, 4895, 2589],
            },
            {
                name: '上期',
                type: 'bar',
                data: [4895, 1598, 3581, 1598, 988, 5985],
            }
        ]
      };
      
      manageFeeStatEchart.setOption(manageFeeStatOption);

      function change(value){
        if(value == 'day'){

        }else if(value == 'week'){
            
        }else if(value == 'month'){

        }
      }
    </script>

    
  </body>
</html>
