<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <script src="js/jquery-3.2.1.min.js"></script>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>通讯录</title>
    <style>
      .address-content{
        background-color: #fff;
        width:100%;
        height:274px;
      }
      .address-content > h3{
        display: inline-block;
        margin-left: 10px;
      }
      .address-list{
        padding: 0 10px;
        margin-top: 0;
      }
      .address-list > li{
        list-style-type:none;padding: 10px 0;font-size: 14px;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      
      .address-list > li > p{
        height: 10px; font-size: 14px;font-weight: 600;margin-top: 0;
      }
      .purple{
        color:#8B6AD4
      }
      .orange{
        color:#F0A100
      }
      .primary{
        color:#338FE5
      }
      .sky{
        color:#556EE6
      }
      .address-small{
        font-size:12px
      }
      .address-space{
        color:#F1F1F1
      }
      .address-search{
        display: block;
        height: 30px;
        border: 1px solid #D9D9D9;
        border-radius: 4px;
        width: 50%;
        margin-left: 25%;
        padding: 0 10px;
      }
      .address-searchicon{
        position: absolute;
        top: 75px;
        right: calc(25% + 5px);
      }
      
    </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
      <h4>通讯录</h4>
      <span class="box_title_right">
        <i
        class="iconfont icon-refresh"
        title="刷新"
        ></i>
      </span>
      </div>
      <div class="content_inner address-content">
        <input placeholder="请输入人员或者名称查询" class="address-search">
        <i  class="iconfont icon-search address-searchicon"></i>
      </input>
     
      <p style="color:#7F7F7F;font-size: 14px;padding: 0 10px;">常用联系人</p>
      <ul class="address-list">
        <li>
          <i  class="iconfont icon-user purple" style="font-size:20px"></i>
          <span>海洋</span>
          <span class="address-space">|</span>
          <i  class="iconfont icon-organize sky address-small"></i>
          <span>研发中心</span>
          <i  class="iconfont icon-card sky address-small"></i>
          <span>6565656565</span>
          <i  class="iconfont icon-telphone sky address-small"></i>
          <span>999 999 999</span>
        </li>
        <li>
          <i  class="iconfont icon-user orange" style="font-size:20px"></i>
          <span>海洋</span>
          <span class="address-space">|</span>
          <i  class="iconfont icon-organize sky address-small"></i>
          <span>研发中心</span>
          <i  class="iconfont icon-card sky address-small"></i>
          <span>6565656565</span>
          <i  class="iconfont icon-telphone sky address-small"></i>
          <span>999 999 999</span>
        </li>
        <li>
          <i  class="iconfont icon-user primary" style="font-size:20px"></i>
          <span>海洋</span>
          <span class="address-space">|</span>
          <i  class="iconfont icon-organize sky address-small"></i>
          <span>研发中心</span>
          <i  class="iconfont icon-card sky address-small"></i>
          <span>6565656565</span>
          <i  class="iconfont icon-telphone sky address-small"></i>
          <span>999 999 999</span>
        </li>
      </ul>
      </div>
    </div>
    
    <script type="text/javascript">
    </script>
  </body>
</html>
