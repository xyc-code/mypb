<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <script src="js/echarts.min.js"></script>
    <script src="js/jquery-3.2.1.min.js"></script>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>我的邮件</title>
    <style>
        .myEmail-content {
          background: #fff;
          height: 328px;
        }
        .myEmail-content > h3{
          display: inline-block;margin-left:20px;margin-right:20px;
        }
        .myEmail-more{
          color: #A8ADB4;
          cursor: pointer;
          float: right;
        }
        .myEmail-more > i{
          margin-right: 10px;
          font-size: 18px;
        }
        .myEmail-more > i:last-child{
          margin-right: 0;
        }
        .myEmail-content > p{
          display: inline-block;
        }
        .myEmail-content > p > span:nth-child(1) {
          text-align: left;
          font-weight: 600;
          font-style: normal;
          font-size: 16px;
          color: #1e1e1e;
        }
        .myEmail-content > div{
          float: right;
          font-weight: 600;
          color:#7F7F7F;
          font-size: 16px;
        }
      </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
      <h4>我的邮件</h4>
      <span class="box_title_right">
        <i
        class="iconfont icon-refresh"
        title="刷新"
        ></i>
      </span>
      </div>
      <div class="myEmail-content content_inner">
        <div id="myEmailPie" style="width: 100%;height: 100%;"></div>
      </div>
    </div>
    <script type="text/javascript">
      var myEmailEchart = echarts.init(document.getElementById("myEmailPie"));

      var myEmailOption = {
        tooltip: {
        trigger: 'item'
      },
      legend: {
        icon: "circle",
        orient: "vertical",
        top: '20%',
        right:'5%',
        textStyle: {
          color: '#999'
        },
      },
      title: {
          text: "问题总数",
          top: "32%",
          left: "19%",
          textStyle: {
            color: "#ccc",
            fontSize: "16px"
          },
          subtext: "122",
          subtextStyle: {
            color: "#000",
            fontSize: "20px",
            align: "center"
          },
          textAlign: "center"
        },
      series: [
          {
              name: '访问来源',
              type: 'pie',
              radius: ['30%', '40%'],
              center: ["20%", "40%"], 
              // roseType: 'area',
              itemStyle: {
                borderColor: '#fff',
                borderWidth: 2
            },　
              avoidLabelOverlap: false,
              label: {
                  show: false,
                  position: 'center'
              },
              labelLine: {
                  show: false
              },
              data: [
                { value: 24, name: "前端框架 | 24" },
                { value: 32, name: "后台功能 | 32" },
                { value: 9, name: "其他问题 | 9" },
                { value: 6, name: "样式异常 | 6" }
              ]
          }
        ]
      };

      myEmailEchart.setOption(myEmailOption);    
    </script>
  </body>
</html>
