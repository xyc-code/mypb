    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>待处理事务</title>
    <style>
    	*{
    		box-sizing: border-box
    	}
      .pending-content{
        background-color: #fff;
        width:100%;
        height:328px;
      }
      .pending-content > ul{
        padding:0;
        margin: 0;
        margin-top: -16px;
        display: inline-block;
        width: 100%;
      }
      .pending-content > ul > li{
        list-style: none;
        display: inline-block;
        height: 60px;
        width: 23.8%;
        text-align: left;
        background-color: #F4F8FF;
        padding: 5px 5px 2px 60px;
        margin: 10px 0.6%;
        float:left;
        position: relative;
      }
      .pending-iconbox{
        width: 40px;
        height: 40px;
        line-height: 40px;
        position: absolute;
        top:10px;
        left: 10px;
      }
      .pending-iconbox > i{
        font-size:40px;
        color:#377FFC;
      }
      .pending-content > ul > li > p{
        margin-bottom: 0;
        font-size:14px;
        margin-top:5px;
        text-align: left;
        color: #333333;
      }
      .pending-content > ul > li > span{
        font-size:12px;
        display: inline-block;
				text-align: left;
        height: 15px;
        line-height: 15px;
        color: #7F7F7F;
      }
    </style>
  </head>
