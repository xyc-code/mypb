<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <script src="js/jquery-3.2.1.min.js"></script>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>规范制度</title>
    <style>
      .rules-content{
        background-color: #fff;
        width:100%;
        height:264px;
      }
      .rules-content > h3{
        display: inline-block;
        margin-left:10px
      }
      .rules-list{
        padding: 0 10px;width: 100%;
      }
      /* i{
        font-size: 20px !important;margin-right: 8px;top: 2px;position: relative;
      } */
      tr{
        line-height: 30px;height:30px;
      } 
      td{
        font-size:14px;text-overflow: ellipsis; overflow: hidden;white-space: nowrap;border-bottom: 1px solid #EDEDED;
      } 
      .rules-title{
        font-size: 14px;width:90%;
      }
      .rules-other{
        color:#7F7F7F;font-size: 12px;width:10%;text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
      <h4>规范制度</h4>
      <span class="box_title_right">
        <i
        class="iconfont icon-refresh"
        title="刷新"
        ></i>
      </span>
      </div>
      <div class="content_inner rules-content">
        <table class="rules-list">
          <tr>
            <td class="rules-title"><i  class="iconfont icon-auditing" style="color:#6966FD"></i>
              差旅订票规范
            </td>
            <td class="rules-other"><i  class="iconfont icon-detail"></i></td>
          </tr>
          <tr>
            <td class="rules-title"><i  class="iconfont icon-auditing" style="color:#6966FD"></i>

          </tr>
          <tr>
            <td class="rules-title"><i  class="iconfont icon-auditing" style="color:#6966FD"></i>
              差旅订票规范
            </td>
            <td class="rules-other"><i  class="iconfont icon-detail"></i></td>
          </tr>
          <tr>
            <td class="rules-title"><i  class="iconfont icon-auditing" style="color:#6966FD"></i>
              差旅订票规范
            </td>
            <td class="rules-other"><i  class="iconfont icon-detail"></i></td>
          </tr>
        </table>
      </div>
    </div>
    <script type="text/javascript">
    </script>
