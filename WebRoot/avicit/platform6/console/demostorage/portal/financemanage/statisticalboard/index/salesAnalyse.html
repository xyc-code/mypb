<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <script src="js/echarts.min.js"></script>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>销售额分析</title>
    <style>
    	   *{
    	   	box-sizing: border-box;
    	   }
        .sales-analyse-content {
          background: #fff;
          height: 330px;
          position: relative;
          padding: 0 500px 0 0;
        }
        
        .sales-analyse-content > p{
          display: inline-block;
        }
        .sales-analyse-content > p > span:nth-child(1) {
          text-align: left;
          font-weight: 600;
          font-style: normal;
          font-size: 16px;
          color: #1e1e1e;
        }
        .sales-analyse-content > div{
          float: right;
          font-weight: 600;
          color:#7F7F7F;
          font-size: 16px;
        }
        .sales-analyse-tab{
          position: absolute;
          right: 20px;
          top: 75px;
        }
        .sales-analyse-tab > span{
          display: inline-block;
          border: 1px solid #D9D9D9;
          width: 50px;
          text-align: center;
          margin-left: -7px;
          height: 25px;
          line-height: 25px;
          color: #676767;
          font-size: 12px;
          font-weight: 500;
        }
        .sales-analyse-tab > span:nth-last-child(2){
          border-left: none;
          border-right: none;
        }
        .sales-analyse-active{
          color:cornflowerblue !important;
          border: 1px solid cornflowerblue !important;
        }
        .sales-analyse-sort{
          width:450px;
          position: absolute;
          top:0px;
          right: 20px;
        }
        .sales-analyse-sort > ul > li{
          list-style: none;
          height:35px;
          line-height: 35px;
          margin: 5px 0;
        }
        .sales-analyse-sort > ul > li > div > label{
          font-weight: 500;
          font-size: 14px;
          color:#323232;
        }
        .sales-analyse-label{
          width: 150px;
          float:left;
        }
        .sales-analyse-order{
          font-weight: 500;
          display: inline-block;
          color: #666;
          height: 26px;
          line-height: 26px;
          text-align: center;
          width: 26px;
          margin-right: 4px;
        }
        .icon-guanjun{
        	color:#FAC72B
        }
        .icon-yajun{
        	color:#F9C279
        }
        .icon-jijun{
        	color:#CBCBCB
        }
        .sales-analyse-order i.iconfont{
        	font-size: 22px;
        }
        .sales-analyse-order i.numberbg{
        	font-size: 14px;
        	background-color: #F0F2F5;
          border-radius: 50%;
          color: #666666;
          width: 22px;
          height:22px;
          margin: 0 2px;
          display: block;
          font-style: normal;
        }
        .sales-analyse-order-box {
          display: inline-block;
          float:right;
          width: 280px;
        }
        .process-box{
        	width:180px;
        	float:left;
        }
        .sales-analyse-process{
          height: 8px;
          background: #448CED;
          border-radius: 7px;
          margin-top: 12px;
        }
        .sales-analyse-order-box > label{
          display: inline-block;
          text-align: right;
          float: right;
        }
      </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
        <h4>销售额分析</h4>
        <span class="box_title_right">
          <i class="iconfont icon-refresh" title="刷新"></i>
        </span>
      </div>
      <div class="sales-analyse-content content_inner">
      	<p style="color:#666;font-weight: 500;margin-left: 15px;margin-bottom:15px;">全年销售额统计</p>
        <div id="sales-analysePie" style="width: 100%;height: 290px;">
        </div>
        <div class="sales-analyse-sort">
          <p style="color:#666;font-weight: 500;margin-bottom:10px;">销售排名</p>
          <ul>
            <li>
              <div class="sales-analyse-label">
                <span class="sales-analyse-order">
                  <i class="iconfont icon-guanjun"></i>
                </span>
                <label>微服务项目</label>
              </div>
              <div class="sales-analyse-order-box"> 
              	<div class="process-box">
                <div class="sales-analyse-process" style="width:95%"></div>
               </div>
                <label>￥500,55.00</label>
              </div>
            </li>
            <li>
              <div class="sales-analyse-label">
                <span class="sales-analyse-order">
                  <i class="iconfont icon-yajun"></i>
                </span>
                <label>研发项目</label>
              </div>
              <div class="sales-analyse-order-box">
              	<div class="process-box">
                	<div class="sales-analyse-process" style="width:88%"></div>
                </div>
                <label>￥467,25.00</label>
              </div>
            </li>
            <li>
              <div class="sales-analyse-label">
                <span class="sales-analyse-order">
                  <i class="iconfont icon-jijun"></i>
                </span>
                <label>容器云项目</label>
              </div>
              <div class="sales-analyse-order-box"> 
              	<div class="process-box">
                	<div class="sales-analyse-process" style="width:70%"></div>
              	</div>
                <label>￥400,58.00</label>
              </div>
            </li>
            <li>
              <div class="sales-analyse-label">
                <span class="sales-analyse-order">
                <i class="numberbg">4</i>
                </span>
                <label>大数据项目</label>
              </div>
              <div class="sales-analyse-order-box">
              	<div class="process-box">
                	<div class="sales-analyse-process" style="width:60%"></div>
               	</div>
                <label>￥358,85.00</label>
              </div>
            </li>
            <li>
              <div class="sales-analyse-label">
                <span class="sales-analyse-order">
                	<i class="numberbg">5</i>
                </span>
                <label>综合管理系统</label>
              </div>
              <div class="sales-analyse-order-box"> 
              	<div class="process-box">
                	<div class="sales-analyse-process" style="width:50%"></div>
               	</div>
                <label>￥300,95.00</label>
              </div>
            </li>
            <li>
              <div class="sales-analyse-label">
                <span class="sales-analyse-order">
                	<i class="numberbg">6</i>
                </span>
                <label>办公管理系统</label>
              </div>
              <div class="sales-analyse-order-box"> 
              	<div class="process-box">
                	<div class="sales-analyse-process" style="width:45%"></div>
                </div>
                <label>￥285,58.00</label>
              </div>
            </li>
            <li>
              <div class="sales-analyse-label">
                <span class="sales-analyse-order">
                	<i class="numberbg">7</i>
                </span>
                <label>代码生成器项目</label>
              </div>
              <div class="sales-analyse-order-box"> 
              	<div class="process-box">
                	<div class="sales-analyse-process" style="width:35%"></div>
               	</div>
                <label>￥235,48.00</label>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </div>
   
    <script type="text/javascript">
      var salesAnalyseEchart = echarts.init(document.getElementById("sales-analysePie"));

      var salesAnalyseOption = {
        tooltip: {
          trigger: 'axis'
        },
        color:['#3BA1FF','#4ECB73','#FBD437'],
        legend: {
          icon: "circle",
          bottom: '0',
          left: 'center',
          itemWidth: 10,  // 设置宽度
          itemHeight: 10, // 设置高度
          itemGap: 5, 
          data: ['历史同期','本期', '上期']
        },
        xAxis: [
            {
                type: 'category',
                data: ['1月', '2月', '3月', '4月', '5月', '6月' ,'7月', '8月', '9月', '10月', '11月', '12月']
            }
        ],
        yAxis: [
            {
                type: 'value'
            }
        ],
        grid: {
          left: "5%",
          right: "2%",
          bottom: 50,
          top: "3%",
        },
        series: [
            {
                name: '历史同期',
                type: 'bar',
                data: [9884, 21402, 35812, 15983, 48951, 25897,44448,66668,33338,45458,34548,12129],
            },
            {
                name: '本期',
                type: 'bar',
                data: [9882, 21402, 35812, 15983, 48951, 25897,15988, 48958, 25898,4444,66668,33339],
            },
            {
                name: '上期',
                type: 'bar',
                data: [48952, 15982, 35812, 15983, 48951, 25897,44448,66668,33338,15988, 38880, 59859],
            }
        ]
      };
      

      salesAnalyseEchart.setOption(salesAnalyseOption);
     
      function change(value){
        if(value == 'day'){

        }else if(value == 'week'){
            
        }else if(value == 'month'){

        }
      }
    </script>

    
  </body>
</html>
