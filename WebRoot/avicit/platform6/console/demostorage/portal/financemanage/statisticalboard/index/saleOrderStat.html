<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">

    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <script src="js/echarts.min.js"></script>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>今日销售额</title>
    <style>
      .saleOrderStat-content{
        background: #F0F2F5;
        height:120px;
        
      }
      .saleOrderStat-imgbox{
        height: 100px;
        width: 100px;
        margin-left: 20px;
        float: left;
      }
      .saleOrderStat-imgbox > img{
        width: 70px;
        height: 70px;
        margin-top: 15px;
      }
      .sale-order-box{
        background-color: #F0F2F5;
        width: 25%;
        height: 100%;
        float: left;
      }
      .saleOrderStat{
        height:100px;
        float:left;
        padding:10px 0 10px 20px;
      }
      .saleOrderStat > label{
        margin-top: 7px;
        display: inline-block;
        color:#666;
        font-size:14px;
      }
      .saleOrderStat > p{
        margin: 10px 0 5px 0;
        color:#5770CC;
        font-size:22px;
      }
      .saleOrderStat > span{
        font-size:12px;
        color:#666;
        margin-right:15px;
      }
      .saleOrderStat > i{
        font-size:12px;
      }
      .todaySale-right{
        float:right
      }
      .icon-down{
        color:#F04134;
      }
      .icon-up{
        color:#00A854;
      }
      .icon-tip{
        color:#989898;
      }
      .todaySale-spacing{
        margin:0 14px 0 0;
      }
      .todaySale-inner-box{
        height: 100%;background-color: #fff
      }
    </style>
  </head>
  <body>
    <div class="box commonFunction saleOrderStat-content">
      <div class="sale-order-box">
        <div class="todaySale-spacing todaySale-inner-box">
          <div class="saleOrderStat" >
            <label>今日销售额</label><i class="iconfont icon-tip"></i>
            <p>￥3,625.93</p>
            <span>同比昨日增长</span><i class="iconfont icon-down">10%</i>
          </div>
          <div id="todaySalePie" style="float:right;margin-right:15px;width: 100px;height: 100%;"></div>
        </div>
      </div>

        </div>
      </div>

      </div>
