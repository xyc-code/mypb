<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <!-- <link href="source/style/index.css" type="text/css" rel="stylesheet" /> -->
    <title>上新模板</title>
    <style>
      .welome-content{
        height:100px;
        background: #fff;
      }
      .welome-imgbox{
        height: 100px;
        width: 100px;
        margin-left: 20px;
        float: left;
      }
      .welome-imgbox > img{
        width: 70px;
        height: 70px;
        margin-top: 15px;
      }
      .welcome-left{
        height:100px;float:left
      }
      .welcome-left > p{
        padding-top: 5px;
      }
      .welcome-left > span{
        font-size:12px;
        color:#666;
      }
      .welcome-right{
        float:right
      }
      .welcome-right > ul{
        margin-top: 5px;
        margin-right: 10px;
      }
      .welcome-right > ul > li{
        list-style: none;
        display: inline-block;
        width:100px;
        text-align: center;
      }
      .welcome-right > ul > li > p{
        color:#666;
        margin-bottom: 5px;
      }
      .welcome-right > ul > li > span{
        color:#526ECC;
        font-size:22px;
      }
    </style>
  </head>
  <body style="margin:0">
    <div class="welome-content">
      <div class="">
        <div class="welome-imgbox">
          <img src="img/u864.png">
        </div>
        <div class="welcome-left">
          <p>
            Hi，管理员~ 欢迎使用金航业务管理平台！
          </p>
          <span>航空工业西安分公司研发中心  普通员工</span>
        </div>
        <div class="welcome-right">
          <ul>
            <li>
              <p>待处理事项</p>
              <span>12</span>
            </li>
            <li>
              <p>我提交的</p>
              <span>4</span>
            </li>
            <li>
              <p>全部事项</p>
              <span>22</span>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <script type="text/javascript">
    </script>
  </body>
</html>
