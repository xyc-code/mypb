<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>快速发起</title>
    <style>
      .shortcut-content{
        height:auto;
        background: #fff;
      }
      /* .shortcut-content > h3{
        display: inline-block;margin-left:20px;margin-right:20px;
      }
      .shortcut-more{
        color: #A8ADB4;
        cursor: pointer;
        float: right;
      }
      .shortcut-more > i{
        margin-right: 10px;
        font-size: 18px;
      }
      .shortcut-more > i:last-child{
        margin-right: 0;
      } */
      .shortcut-content > ul{
        margin-top: -16px;
      }
      .shortcut-content > ul > li{
        list-style: none;
        display: inline-block;
        height:80px;
        width:110px;
        text-align: center;
        background-color: #F7F7F7;
        border:1px solid #f1f2f6;
        padding: 12px 10px 2px;
        margin: 0px 5px;
        cursor: pointer;
      }
      .shortcut-iconbox{
        height:40px;
        width:40px;
        line-height: 40px;
        display: inline-block;
        border-radius: 4px;
      }
      .shortcut-iconbox > i{
        font-size:26px;
        color:#fff;
      }
      .shortcut-content > ul > li > p{
        font-size:14px;
        margin-top: 10px;
      }
      .clam{
        background-color: #388FF3;
      }
      .primary{
        background-color: #34C8CA;
      }
      .orange{
        background-color: #F59140;
      }
      .pink{
        background-color: #FB6594;
      }
      .purple{
        background-color: #577CEF;
      }
    </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
      <h4>快速发起</h4>
      <span class="box_title_right">
        <i
        class="iconfont icon-refresh"
        title="刷新"
        ></i>
      </span>
      </div>
      <div class="shortcut-content content_inner">
        <ul>
          <li>
            <div class="shortcut-iconbox clam">
              <i class="iconfont icon-sale-detail"></i>
            </div>
            <p>销售汇总表</p>
          </li>
          <li>
            <div class="shortcut-iconbox primary">
              <i class="iconfont icon-report"></i>
            </div>
            <p>销售排行表</p>
          </li>
          <li>
            <div class="shortcut-iconbox orange">
              <i class="iconfont icon-dingdan"></i>
            </div>
            <p>销售订单统计表</p>
          </li>
          <li>
            <div class="shortcut-iconbox pink">
              <i class="iconfont icon-tianchongxing02"></i>
            </div>
            <p>以销定购</p>
          </li>
          <!-- <li>
            <div class="shortcut-iconbox purple">
              <i class="iconfont icon-sale-detail"></i>
            </div>
            <p>采购明细表</p>
          </li>
          <li>
            <div class="shortcut-iconbox clam">
              <i class="iconfont icon-sale-detail"></i>
            </div>
            <p>采购汇总表</p>
          </li>
          <li>
            <div class="shortcut-iconbox primary">
              <i class="iconfont icon-sale-detail"></i>
            </div>
            <p>采购订单汇总表</p>
          </li>
          <li>
            <div class="shortcut-iconbox orange">
              <i class="iconfont icon-sale-detail"></i>
            </div>
            <p>销售订单</p>
          </li> -->
          <li>
            <div class="shortcut-iconbox pink">
              <i class="iconfont icon-outstore"></i>
            </div>
            <p>销售出库</p>
          </li>
          <li>
            <div class="shortcut-iconbox purple">
              <i class="iconfont icon-buydetail"></i>
            </div>
            <p>费用明细表</p>
          </li>
          <li>
            <div class="shortcut-iconbox" style="border:1px dashed #BBBFC5">
              <i class="iconfont icon-plus" style="color:#BBBFC5"></i>
            </div>
            <p>添加</p>
          </li>
        </ul>
      </div>
    </div>
    <script type="text/javascript">
    </script>
  </body>
</html>
