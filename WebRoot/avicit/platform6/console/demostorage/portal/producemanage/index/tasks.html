<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>年度任务对标</title>
    <script src="./source/js/echarts.min.js"></script>
    <link
      href="./source/iconfont/iconfont.css"
      type="text/css"
      rel="stylesheet"
    />
    <link href="./source/style/index.css" type="text/css" rel="stylesheet" />
  </head>
  <body>
    <div class="box">
      <div class="box_title">
        <h4>年度任务对标</h4>
        <span class="box_title_right">
<!--          <i class="iconfont icon-download-fill" title="下载"  onclick="downloadFile('tasks')"></i>-->
          <i class="iconfont icon-refresh" title="刷新"></i>
        </span>
      </div>
      <div class="content_inner">
        <ul class="tasks-content">
          <li class="tc-list">
            <div class="tc-cont tc-tip">
              <div class="tc-icon1">
                <i
                  class="iconfont icon-tianchongxing02"
                  style="font-size: 30px;"
                ></i>
              </div>
              <div class="tc-right">
                <p><span>计划数</span></p>
                <p><span class="tcr-num1">3467</span><span class="tcr-pe">个</span></p>
              </div>
            </div>
          </li>
          <li class="tc-list">
            <div class="tc-cont tc-tip">
              <div class="tc-icon2">
                <i class="iconfont icon-chart" style="font-size: 30px;"></i>
              </div>
              <div class="tc-right">
                <p><span>完成数</span></p>
                <p><span class="tcr-num2">15</span><span class="tcr-pe">个</span></p>
              </div>
            </div>
          </li>
          <li class="tc-list">
            <div class="tc-cont tc-tip">
              <div class="tc-icon3">
                <i class="iconfont icon-fee-report" style="font-size: 30px;"></i>
              </div>
              <div class="tc-right">
                <p><span>完成率</span></p>
                <p><span class="tcr-num2">68</span><span class="tcr-pe">%</span></p>
              </div>
            </div>
          </li>
          <div class="clear"></div>
        </ul>
        <div id="lineEchart" style="width: 100%;height: 245px"></div>
      </div>
    </div>
  </body>
  <script type="text/javascript">
    var lineEchart = echarts.init(document.getElementById("lineEchart"));

    var lineOption = {
      tooltip: {
        trigger: "axis",
        axisPointer: {
          type: "cross"
        }
      },
      legend: {
        data: ["计划", "完成"],
        right: 40,
        itemWidth: 10,
        itemHeight: 10
      },
      color: ["#108EE9", "#2FC25B"],
      grid: {
        top: 30,
        left: "3%",
        right: "2%",
        bottom: "3%",
        containLabel: true
      },
      xAxis: {
        type: "category",
        boundaryGap: false,
        data: [
          "1月",
          "2月",
          "3月",
          "4月",
          "5月",
          "6月",
          "7月",
          "8月",
          "9月",
          "10月",
          "11月",
          "12月"
        ],
        splitLine: {
          lineStyle: {
            dashOffset: 10
          }
        }
      },
      yAxis: {
        type: "value",
        splitLine: {
          lineStyle: {
            type: "dashed"
          }
        }
      },
      series: [
        {
          name: "计划",
          type: "line",
          data: [120, 720, 100, 340, 700, 300, 210, 120, 320, 100, 340, 700]
        },
        {
          name: "完成",
          type: "line",
          data: [340, 100, 300, 750, 120, 320, 120, 320, 100, 340, 700, 300]
        }
      ]
    };

    lineEchart.setOption(lineOption);

    function downloadFile(fileName) {
      let a = document.createElement("a");
      a.href = "/download/template5/" + fileName + ".rar";
      a.download = fileName + ".rar";
      a.click();
    }
  </script>
  <style>
  	*{
  		box-sizing: border-box;
  	}
    .clear {
      clear: both;
    }
    .tc-list {
      width: 33.3%;
      float: left;
      padding: 5px;
    }
    .tc-cont {
      width: 100%;
      height: 100%;
      border: 1px solid #ebebeb;
    }
    .tc-tip {
      height: 70px;
    }
    .tc-icon1 {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #577cef;
      color: #fff;
      font-size: 14px;
      line-height: 40px;
      text-align: center;
      margin: 14px 5px;
      float: left;
    }
    .tc-right {
      float: left;
      width: 43%;
      font-family: "微软雅黑";
      font-weight: 400;
      font-style: normal;
      font-size: 14px;
      color: #666666;
      text-align: left;
      margin: 10px 0;
    }
    .tcr-num1 {
      font-family: "DIN Bold", "DIN";
      font-weight: 700;
      font-size: 18px;
      text-decoration: none;
      color: #2fc25b;
    }
    .tcr-pe {
      font-size: 10px;
    }
    .tc-icon2 {
      width: 40px;
      height: 40px;
      background: #f59140;
      border-radius: 50%;
      color: #fff;
      font-size: 14px;
      line-height: 40px;
      text-align: center;
      margin: 14px 5px;
      float: left;
    }
    .tcr-num2 {
      font-family: "DIN Bold", "DIN";
      font-weight: 700;
      font-size: 18px;
      text-decoration: none;
      color: #1890ff;
      margin: 0 5px 0 0;
    }
    .tc-icon3 {
      width: 40px;
      height: 40px;
      float: left;
      background: #34c8ca;
      border-radius: 50%;
      color: #fff;
      font-size: 14px;
      line-height: 40px;
      text-align: center;
      margin: 14px 5px;
    }
  </style>
</html>
