<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="renderer" content="webkit|ie-stand" />
    <link
      rel="shortcut icon"
      href="favicon.ico"
      mce_href="favicon.ico"
      type="image/x-icon"
    />
    <meta charset="utf-8" />
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <meta name="description" content="" />
    <meta name="keywords" content="登录" />
    <link rel="stylesheet" type="text/css" href="css/login1.css" />
    <link rel="stylesheet" type="text/css" href="css/login1-reset.css" />
    <link rel="stylesheet" type="text/css" href="css/login1-newblue.css" />
    <title>欢迎使用-综合管理一体化平台</title>
  </head>
  <body>
    <div class="login">
      <div class="login_Box">
        <div class="Login_Top">
          <div class="Login_Top_Logo">
            <img src="img/logo.png" />
            <p>
              <span>支持转型升级</span>
              <span>推进管理创新</span>
            </p>
          </div>
          <div style="" class="waveWrapper waveAnimation">
            <div class="arrow arrow1">
              <img src="img/login-icon1.png" />
            </div>
            <div class="arrow arrow2">
              <img src="img/login-icon2.png" />
            </div>
            <div class="arrow arrow3">
              <img src="img/login-icon3.png" />
            </div>
            <div class="waveWrapperInner bgTop">
              <div
                class="wave waveTop"
                style="background-image: url('img/wave-top.png')"
              ></div>
            </div>
            <div class="waveWrapperInner bgMiddle">
              <div
                class="wave waveMiddle"
                style="background-image: url('img/wave-mid.png')"
              ></div>
            </div>
            <div class="waveWrapperInner bgBottom">
              <div
                class="wave waveBottom"
                style="background-image: url('img/wave-bot.png')"
              ></div>
            </div>
            <div class="waveWrapperInner bgBottom2">
              <div
                class="wave waveBottom"
                style="background-image: url('img/wave-sss.png')"
              ></div>
            </div>
          </div>
        </div>
        <div class="Login_Con">
          <div class="Login_Con_top">
            <span>欢迎登录</span>
            <p>业务基础平台</p>
          </div>
          <form style="height: 278px">
            <!--action="http://117.36.76.70:7086/simp/admin/login"
            onsubmit="return check();"
            method="post"
            style="height: 278px"
          >-->
            <div class="Login_Con_Urse">
              <i class="icon icon-urse tb"></i>
              <input
                type="text"
                id="username_"
                name="username_"
                focucmsg="登录名"
                tabindex="1"
                placeholder="请输入登录名"
              />
            </div>
            <div class="Login_Con_Password">
              <i class="icon icon-password tb"></i>
              <input
                type="text"
                autocomplete="off"
                class="userinput"
                id="showPwd"
                focucmsg="密码"
                placeholder="请输入密码"
                tabindex="2"
              />
              <input
                autocomplete="off"
                style="display: none;"
                id="password"
                size="20"
                tabindex="2"
                type="password"
              />
            </div>

            <!-- <div class="Login_Con_Checkbox">
					<input type="checkbox" />记住密码</div> -->
            <div id="errorMsg" class="forgetPwdLine"></div>
            <div class="Login_Con_Button">
              <button type="button">登 录</button>
            </div>
          </form>
        </div>
      </div>
      <p class="copyright">
        Copyright © 2016-2020 AVIC-DIGITAL All Rights Reserved
      </p>
    </div>
  </body>
</html>
