<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>登录页面</title>
    <link href="css/login11.css" type="text/css" rel="stylesheet" />
  </head>
  <body>
    <div class="top-logo">
      <img src="img/logo.png" />
      <h1 class="logo_title">金航业务基础平台</h1>
    </div>
    <div class="left_text">
      <h4>推进产业数字化</h4>
      <h4 style="padding-left: 80px;">践行数字产业化</h4>
    </div>
    <div class="login">
      <ul class="loginform">
        <p class="top-title">业务基础平台</p>
        <p class="login-title">用户登录</p>
        <li class="uinArea">
          <input
            type="text"
            name="username"
            class="inputstyle"
            placeholder="请输入用户名"
          />
        </li>
        <li class="pwdArea">
          <input
            type="password"
            name="password"
            class="inputstyle"
            placeholder="请输入密码"
          />
        </li>
        <li class="text-tip">
          <span style="display: none;">登录失败：密码不能为空！</span>
        </li>
        <li><button type="button" value="登录" class="btn">登录</button></li>
      </ul>
    </div>
  </body>
</html>
