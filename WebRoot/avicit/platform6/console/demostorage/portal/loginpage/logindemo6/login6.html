<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <meta name="description" content="" />
    <meta name="keywords" content="综合服务保障平台" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="css/login6-public.css" />
    <link rel="stylesheet" href="css/login6.css" />
    <title>登录</title>
  </head>
  <body>
    <div class="lg-content" id="app">
      <div class="lg-mid">
        <div class="lg-mid-left">
          <img src="img/login6_aircraft.png" />
        </div>
        <div class="lg-mid-right">
          <form>
            <!--action="http://10.216.80.249:8008/ZBPT/admin/login"
            method="post"
          >-->
            <img src="img/login6-logo.png" style="margin-left:20px" />
            <div class="lg-inp-box">
              <div class="lg-form-group">
                <img src="img/login6_icon_user.png" />
                <input
                  class="lg-input-u-user"
                  type="text"
                  placeholder="请输入用户名"
                  name="username_"
                />
              </div>
              <div class="lg-form-group">
                <span class="msg-tip" id="uesrmsg"></span>
              </div>
              <div class="lg-form-group">
                <img src="img/login6_icon_password.png" />
                <input
                  type="password"
                  class="lg-input-u-passw"
                  placeholder="请输入密码"
                  name="password_"
                />
              </div>
              <div class="lg-form-group">
                <span class="msg-tip" id="passwordmsg"></span>
              </div>
              <div class="lg-form-group">
                <!--<button onclick="submitUserMes()">-->
                <button type="button">
                  登&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;录
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
