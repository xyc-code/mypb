<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>通讯录</title>
			<link rel="stylesheet" href="./source/css/workbench.css" />
			<link rel="stylesheet" href="./source/avic_icon/iconfont.css" />
			<link href="./source/style/index.css" type="text/css" rel="stylesheet" />
	</head>
	<style>
		.contact_search{
			width: 100%;
			height: 34px;
			border: 1px solid #D7D7D7;
			box-sizing: border-box;
		}
		.contact_search input{
			line-height: 32px;
			width: 90%;
			padding-left: 10px;
			border:none;
			outline:medium;
			color: #7F7F7F;
			font-size: 14px;
		}
		.contact_body>p{
			margin: 10px 0;
			font-size: 14px;
			color: #333333;
		}
		.contact_content ul li{
			overflow: hidden;
		}
		.contact_content ul li>.contact_head{
			width: 32px;
			height: 32px;
			float: left;
		}
		.contact_name{
			float: left;
			font-size: 14px;
			color: #333333;
			line-height: 32px;
			margin-left: 4px;
		}
		.company{
			float: left;
			overflow: hidden;
			margin-left: 10px;
			width:74px;
		}
		.department,.telephone{
			float: left;
			overflow: hidden;
			margin-left: 10px;
		}
		.company>.icon,.department>.icon,.telephone>.icon{
			float: left;
			margin-top: 9px;
		}
		.company>.iconfont{
			float: left;
			font-size: 14px;
			margin-top: 9px;
		}
		.department>.iconfont{
			float: left;
			font-size: 14px;
			margin-top: 9px;
		}
		.telephone>.iconfont{
			float: left;
			font-size: 14px;
			margin-top: 9px;
		}
		.company>p,.department>p,.telephone>p{
			float: left;
			font-size: 14px;
			color: #333333;
			line-height: 32px;
			margin-left: 4px;
		}
		.contact_top{
			margin-top: 12px;
		}
		.items {
			max-width: 49px;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}
	</style>

			function downloadFile(fileName) {
