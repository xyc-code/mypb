<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title> 新闻公告</title>
		<link rel="stylesheet" href="./source/css/workbench.css" />
		<link rel="stylesheet" href="./source/avic_icon/iconfont.css" />
		<link href="./source/style/index.css" type="text/css" rel="stylesheet" />
	</head>
	<style>
		.news_box{
			/*width: 100%;*/
			position: absolute;
		    left: 0;
		    right: 12px;
		    top: 0;
		    bottom: 0;
		    background: #FFFFFF;
		    min-height: 20px;
		    border-radius: 4px;
		}
		.news_title{
			overflow: hidden;
			height: 54px;
			border-bottom: 1px solid #E9E9E9;
   			box-sizing: border-box;
		}
		.news_title h1{
			float: left;
			font-size: 16px;
			line-height: 54px;
			font-weight: bold;
			color: #333333;
			margin-left: 24px;
		}
		.news_title .icon{
			float: right;
		    margin-right: 24px;
		    margin-top: 15px;
		    font-size: 20px;
		}
		.news_body{
			padding: 24px;
		}
		.news_content{
			/*margin-top: 10px;*/
		}
		.news_content ul li{
			overflow: hidden;
			height: 36px;
		}
		.news_num{
			float: left;
			width: 14px;
			height: 14px;
			font-size: 12px;
			background: #338FE5;
			color: #ffffff;
			line-height: 14px;
			text-align: center;
			margin-top: 11px;
		}
		.news_name{
			float: left;
			font-size: 14px;
			color: #333333;
			line-height: 36px;
			margin-left: 10px;
			width:252px;
			white-space: nowrap;
			overflow: hidden;
			text-overflow: ellipsis;
		}
		.news_date{
			float: right;
			font-size: 14px;
			color: #909090;
			line-height: 36px;
			margin-left: 10px;
		}
	</style>
	<body>
		<div class="box">
			<div class="box_title">
				<h4>新闻公告</h4>
				<span class="box_title_right">
				  <i class="iconfont icon-download" title="下载" onclick="downloadFile('todo')"></i>
				</span>
			</div>
			<div class="content_inner">
				<div class="news_body">
					<img style="width: 100%; height: 178px;" src="./source/img/news.png" />
					<div class="news_content">
						<ul>
							<li>
								<p class="news_num">1</p>
								<p class="news_name">金航数码举办第一期党史学习教育读书班</p>
								<p class="news_date">2021.05.26</p>
							</li>
							<li>
								<p class="news_num">2</p>
								<p class="news_name">金航数码举办第一期党史学习教育读书班</p>
								<p class="news_date">2021.05.26</p>
							</li>
							<li>
								<p class="news_num">3</p>
								<p class="news_name">金航数码举办第一期党史学习教育读书班</p>
								<p class="news_date">2021.05.26</p>
							</li>
						</ul>
					</div>
				</div>
			</div>
		</div>
		<!-- <div class="news_box"> -->
			<!-- <div class="news_title">
				<h1>新闻公告</h1>
				<div class="icon iconfont icon-an-ellipsis" style="color: #7F7F7F;"></div>
			</div> -->
			
		<!-- </div> -->
	</body>
</html>
