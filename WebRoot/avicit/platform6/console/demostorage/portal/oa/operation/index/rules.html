<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <script src="js/jquery-3.2.1.min.js"></script>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>规范制度</title>
    <style>
      .rules-content {
        background-color: #fff;
        width: 100%;
        height: 264px;
      }
      .rules-content > h3 {
        display: inline-block;
        margin-left: 10px;
      }
      .rules-list {
        padding: 0 10px;
        width: 100%;
      }

      .rules-content td {
        line-height: 28px;
        padding: 8px;
        font-size: 14px;
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
        border-bottom: 1px solid #ededed;
      }
      .rules-content tr:hover {
        background-color: #f7f7f7;
      }

      .rules-content i {
        font-size: 24px;
        vertical-align: middle;
        width: 28px;
        height: 28px;
        display: inline-block;
      }
      .rules-content i.icon-detail {
        text-align: right;
        font-size: 14px;
      }
      .rules-other {
        color: #7f7f7f;
        text-align: right;
      }
    </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
        <h4>规范制度</h4>
        <span class="box_title_right">
          <i class="iconfont icon-refresh" title="刷新"></i>
          <i class="iconfont icon-more" title="更多"></i>
        </span>
      </div>
      <div class="content_inner rules-content">
        <table class="rules-list" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td class="rules-title">
              <i class="iconfont icon-auditing" style="color:#6966FD"></i>
              差旅订票规范
            </td>
            <td class="rules-other"><i class="iconfont icon-detail"></i></td>
          </tr>
          <tr>
            <td class="rules-title">
              <i class="iconfont icon-auditing" style="color:#6966FD"></i>
              差旅订票规范
            </td>
            <td class="rules-other"><i class="iconfont icon-detail"></i></td>
          </tr>
          <tr>
            <td class="rules-title">
              <i class="iconfont icon-auditing" style="color:#6966FD"></i>
              差旅订票规范
            </td>
            <td class="rules-other"><i class="iconfont icon-detail"></i></td>
          </tr>
          <tr>
            <td class="rules-title">
              <i class="iconfont icon-auditing" style="color:#6966FD"></i>
              差旅订票规范
            </td>
            <td class="rules-other"><i class="iconfont icon-detail"></i></td>
          </tr>
        </table>
      </div>
    </div>
    <script type="text/javascript">
      function handleClick() {
        window.open("rules.html");
      }
    </script>
  </body>
</html>
