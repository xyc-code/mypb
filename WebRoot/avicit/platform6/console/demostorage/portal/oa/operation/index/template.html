<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>title</title>
  <link href="css/index.css" type="text/css" rel="stylesheet" />
</head>

<body>
  <div class="title">
    <div style="padding-bottom: 16px;">
      <span>Digital Design</span>
      <span>工作台模板上新</span>
<!--      <img src="./img/u441.svg" alt="" />-->
<!--      <img src="./img/u441.svg" alt="" />-->
<!--      <img src="./img/u441.svg" alt="" />-->
    </div>
    <p>根据组件库搭建常用页面模版，例如 筛选表格、数据分析等典型页面</p>
    <a class="title_btn"  href="####">立即使用</a>
  </div>
  <style>
    body {
      background: #fff;
    }

    .title {
      background: url(img/u437.png) no-repeat right;
      padding: 16px 32px;
      box-sizing: border-box;
      background-color: #fff;
      border: 1px solid #e9e9e9;
      border-radius: 4px;
      overflow: hidden;
    }



    .title p {
      color: #888;
      margin: 0;
      width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .title>div:nth-child(1)>span:nth-child(1) {
      font-family: "Microsoft YaHei UI Semibold", "Microsoft YaHei UI Regular",
        "Microsoft YaHei UI", sans-serif;
      font-weight: 600;
      font-style: normal;
      font-size: 18px;
      color: #5956e9;
    }

    .title>div:nth-child(1)>span:nth-child(2) {
      font-family: "Microsoft YaHei UI Semibold", "Microsoft YaHei UI Regular",
        "Microsoft YaHei UI", sans-serif;
      font-weight: 600;
      font-style: normal;
      font-size:18px;
    }

    .title_btn {
      background: #5473e8;
      height: 32px;
      width: 120px;
      color: #fff;
      display: inline-block;
      text-align: center;
      line-height: 32px;
      border-radius: 20px;
      margin: 16px 0;
      cursor: pointer;
      text-decoration: none;
    }
  </style>
</body>

</html>
