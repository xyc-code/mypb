<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <script src="js/jquery-3.2.1.min.js"></script>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>文档中心</title>
    <style>
      .files-content {
        background-color: #fff;
      }
      .files-content > h3 {
        display: inline-block;
        margin-left: 10px;
      }
      .files-list {
        width: 100%;
      }
      .files-list td {
        line-height: 28px;
        padding: 8px;
        font-size: 14px;
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
        border-bottom: 1px solid #ededed;
      }
      .files-list tr:hover {
        background-color: #f7f7f7;
      }

      .files-title i {
        font-size: 24px;
        line-height: 28px;
        vertical-align: middle;
        width: 28px;
        height: 28px;
        display: inline-block;
      }
      .email-other {
        color: #7f7f7f;
        font-size: 12px;
        width: 25%;
      }

      .files-title {
        font-size: 14px;
        width: 50%;
      }
      .files-other {
        color: #7f7f7f;
        font-size: 12px;
        width: 25%;
      }
    </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
        <h4>文档中心</h4>
        <span class="box_title_right">         
          <i class="iconfont icon-refresh" title="刷新"></i>
          <i class="iconfont icon-more" title="更多"></i>
        </span>
      </div>
      <div class="content_inner files-content">
        <table class="files-list" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td class="files-title">
              <i class="iconfont icon-auditing" style="color:#6966FD"></i>
              模板库汇报方案
            </td>
            <td class="files-other">1.2M</td>
            <td class="files-other">2021/6/25 8:20</td>
          </tr>
          <tr>
            <td class="files-title">
              <i class="iconfont icon-auditing" style="color:#6966FD"></i>
              V6R4平台技术白皮书
            </td>
            <td class="files-other">1.2M</td>
            <td class="files-other">2021/6/25 8:20</td>
          </tr>
          <tr>
            <td class="files-title">
              <i class="iconfont icon-auditing" style="color:#6966FD"></i>
              工作计划
            </td>
            <td class="files-other">1.2M</td>
            <td class="files-other">2021/6/25 8:20</td>
          </tr>
          <tr>
            <td class="files-title">
              <i class="iconfont icon-auditing" style="color:#6966FD"></i>
              Design设计
            </td>
            <td class="files-other">1.2M</td>
            <td class="files-other">2021/6/25 8:20</td>
          </tr>
        </table>
      </div>
    </div>

    <script type="text/javascript">
      function handleClick() {
        window.open("filesCenter.html");
      }
    </script>
  </body>
</html>
