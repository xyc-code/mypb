<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <script src="js/echarts.min.js"></script>
    <script src="js/jquery-3.2.1.min.js"></script>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>我的邮件</title>
    <style>
      .myEmail-content {
        background: #fff;
      }
      .myEmail-content > h3 {
        display: inline-block;
      }
      .myEmail-more {
        color: #a8adb4;
        cursor: pointer;
        float: right;
      }
      .myEmail-more > i {
        margin-right: 10px;
        font-size: 18px;
      }
      .myEmail-more > i:last-child {
        margin-right: 0;
      }
      .myEmail-content > p {
        display: inline-block;
      }
      .myEmail-content > p > span:nth-child(1) {
        text-align: left;
        font-weight: 600;
        font-style: normal;
        font-size: 16px;
        color: #1e1e1e;
      }
      .myEmail-content > div {
        float: right;
        font-weight: 600;
        color: #7f7f7f;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
        <h4>我的邮件</h4>
        <span class="box_title_right">
          <i class="iconfont icon-refresh" title="刷新"></i>
          <i class="iconfont icon-more" title="更多"></i>
        </span>
      </div>
      <div class="myEmail-content content_inner">
        <div id="myEmailPie" style="width: 100%;height: 100%;"></div>
      </div>
    </div>
    <script type="text/javascript">
      var myEmailEchart = echarts.init(document.getElementById("myEmailPie"));

      var myEmailOption = {
        title: {
          text: "问题总数",
          top: "38%",
          left: "33%",
          textStyle: {
            color: "#333",
            fontSize: "18px",
            fontWeight: "normal"
          },
          subtext: "122",
          subtextStyle: {
            color: "#52A0E9",
            fontSize: "32px",
            align: "center"
          },
          textAlign: "center"
        },

        tooltip: {
          trigger: "item"
        },
        color: ["#52A0E9", "#46BF92", "#9D81DB", "#FCC233"],
        legend: {
          orient: "vertical",
          right: "10%",
          top: "30%",
          itemWidth: 16,
          itemHeight: 16,
          textStyle: {
            color: "#999",
            fontSize: "14px"
          }
        },

        series: [
          {
            name: "访问来源",
            type: "pie",
            center: ["34%", "50%"],
            radius: ["66%", "80%"],
            avoidLabelOverlap: false,
            itemStyle: {
              borderRadius: 4,
              borderColor: "#fff",
              borderWidth: 4
            },
            label: {
              show: false,
              position: "center"
            },
            emphasis: {
              label: {
                show: false,
                fontSize: "40",
                fontWeight: "bold"
              }
            },
            grid: {
              left: "1%",
              top: "3%"
            },
            labelLine: {
              show: false
            },
            data: [
              { value: 1048, name: "搜索引擎" },
              { value: 580, name: "邮件营销" },
              { value: 484, name: "联盟广告" },
              { value: 300, name: "视频广告" }
            ]
          }
        ]
      };

      myEmailEchart.setOption(myEmailOption);

      function handleClick() {
        window.open("myEmail.html");
      }
    </script>
  </body>
</html>
