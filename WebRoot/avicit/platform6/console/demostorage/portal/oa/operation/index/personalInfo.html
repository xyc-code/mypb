<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
    <link href="css/index.css" type="text/css" rel="stylesheet" />
    <title>个人信息</title>
    <style>
      ul {
        padding: 0;
        margin: 0;
      }
      .personal-content {
        background-color: #fff;
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
      }
      .personal-content > h3 {
        display: inline-block;
        margin-left: 10px;
      }
      .personal-list {
        margin-top: -10px;
      }
      .personal-list > ul > li {
        width: 33.33%;
        list-style-type: none;
        margin-left: 0;
        margin-top: 10px;
      }
      .personal-noshadow {
        float: left;
        width: 32px;
        text-align: center;
        margin-right: 8px;
      }
      .personal-shadow {
        float: left;
        width: 35px;
        line-height: 35px;
        text-align: center;
        border-radius: 50%;
        background-color: #e8e8e8;
        margin-right: 10px;
      }
      .personal-list > ul > li {
        height: 45px;
      }
      .personal-list > ul > li > div > i {
        font-size: 32px;
        color: #7f7f7f;
        vertical-align: top;
      }
      .personal-list > ul > li > span {
        display: block;
        font-size: 14px;
        font-weight: 600;
      }
      .personal-list > ul > li > label {
        display: block;
        font-size: 14px;
        color: #7f7f7f;
      }
      .personal-block-ele {
        display: inline-block;
      }
      .personal-process-box {
        width: 80% !important;
        height: 8px;
        margin: 6px 0 6px 0;
        border: 1px solid #f3f3f3;
        border-radius: 7px;
        background-color: #f3f3f3;
        float: left;
      }
      .personal-process {
        height: 8px;
        background: #448ced;
        border-radius: 7px;
      }
    </style>
  </head>
  <body>
    <div class="box commonFunction">
      <div class="box_title">
        <h4>个人信息</h4>
        <span class="box_title_right">
          <i class="iconfont icon-refresh" title="刷新"></i>
        </span>
      </div>
      <div class="content_inner personal-content">
        <div class="personal-list">
          <ul>
            <li style="width:100%">
              <div class="personal-noshadow">
                <i class="iconfont icon-user"></i>
              </div>
              <span style="display: block;">海洋</span>
              <label style="display: block;">平台管理员</label>
            </li>
          </ul>
          <ul>
            <li class="personal-block-ele">
              <div class="personal-noshadow">
                <i class="iconfont icon-arrow-right" style="color:#338FE5"></i>
              </div>
              <span style="display: block;">3</span>
              <label style="display: block;">待办</label>
            </li>
            <li class="personal-block-ele">
              <div class="personal-noshadow">
                <i class="iconfont icon-pause" style="color:#F0A100"></i>
              </div>
              <span style="display: block;">4</span>
              <label style="display: block;">进行中</label>
            </li>
            <li class="personal-block-ele">
              <div class="personal-noshadow">
                <i class="iconfont icon-finish" style="color:#24B47E"></i>
              </div>
              <span style="display: block;">20</span>
              <label style="display: block;">已完成</label>
            </li>
          </ul>
          <ul
            style="margin-top:8px;padding-top: 8px;border-top: 1px solid #e8e8e8;"
          >
            <li style="width:auto">
              <div class="personal-shadow">
                <i class="iconfont icon-alarm" style="font-size:18px"></i>
              </div>
              <span style="display: block;">星期四</span>
              <label style="display: block;"
                >2021-6-24
                <font style="color: #448CED;font-size: 12px;">
                  &nbsp;&nbsp; 打卡时间: 8:30</font
                >
              </label>
            </li>
            <li style="width:auto;">
              <div class="personal-shadow">
                <i class="iconfont icon-calendar" style="font-size:18px"></i>
              </div>
              <span style="display: block;">
                <font>任务完成情况</font
                ><font
                  style="position: absolute;
                right: 20%;color:#448CED"
                  >60%</font
                ></span
              >
              <div class="personal-process-box">
                <div class="personal-process" style="width:80%"></div>
              </div>
            </li>
          </ul>
        </div>
      </div>
    </div>
    <script type="text/javascript">
      function handleClick() {
        window.open("personalInfo.html");
      }
    </script>
  </body>
</html>
