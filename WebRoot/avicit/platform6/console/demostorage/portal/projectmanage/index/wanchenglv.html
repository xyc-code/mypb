<!DOCTYPE html>
<html style="min-width: 300px;">

	<head>
		<meta charset="utf-8">
		<title></title>
		<link rel="stylesheet" href="css/index.css" />
		<link rel="stylesheet" href="iconfont/iconfont.css" />		
		<link rel="stylesheet" href="font-awesome-4.7.0/css/font-awesome.css" />
		<link rel="stylesheet" href="font-awesome-4.7.0/css/font-awesome.min.css" />
		<script src="js/echarts.min.js"></script>
		<script src="js/jquery1.42.min.js"></script>
	</head>

	<body>
		<div class="content_box  clearfix">
			<div class="title_switch box_title ">
				<div class="title">任务完成率</div>
				<div class="box_title_right">
					<div class="icon_more">
					<i
					class="iconfont icon-refresh"
					title="刷新"
					></i>
					</div>
				</div>
			</div>
			<div class="content_inner">
				<div id="wanchenglvPie" style="height: 270px;"></div>
			</div>
		</div>
		<script type="text/javascript">
			var wanchenglvEchart = echarts.init(document.getElementById("wanchenglvPie"));

			var wanchenglvOption = {
			title: {
				text: "完成总数",
				top: "38%",
				left: "33%",
				textStyle: {
				color: "#333",
				fontSize: "18px",
				fontWeight: "normal"
				},
				subtext: "122",
				subtextStyle: {
				color: "#52A0E9",
				fontSize: "32px",
				align: "center"
				},
				textAlign: "center"
			},

			tooltip: {
				trigger: "item"
			},
			color: ["#37CBCB", "#3BA1FF", "#4FCB74", "#FBD438", "#9860E5", "#F04864"],
			legend: {
				icon: "circle",
				orient: "vertical",
				right: "10%",
				top: "15%",
				itemWidth: 16,
				itemHeight: 16,
				textStyle: {
				color: "#999",
				fontSize: "14px"
				}
			},

			series: [
				{
				name: "访问来源",
				type: "pie",
				center: ["34%", "50%"],
				radius: ["66%", "80%"],
				avoidLabelOverlap: false,
				itemStyle: {
					// borderRadius: 4,
					borderColor: "#fff",
					borderWidth: 2
				},
				label: {
					show: false,
					position: "center"
				},
				emphasis: {
					label: {
					show: false,
					fontSize: "40",
					fontWeight: "bold"
					}
				},
				grid: {
					left: "1%",
					top: "3%"
				},
				labelLine: {
					show: false
				},
				data: [
					{ value: 1048, name: "图例1 |  42%" },
					{ value: 580, name: "图例2 |  12%" },
					{ value: 484, name: "图例3 |  11%" },
					{ value: 300, name: "图例4 |  6%" },
					{ value: 310, name: "图例5 |  5%" },
					{ value: 200, name: "图例6 |  3%" }
				]
				}
			]
			};

			wanchenglvEchart.setOption(wanchenglvOption);
			$(window).resize(function() { //重置容器高宽 
			wanchenglvEchart.resize(); 
			});
		</script>
	</body>

</html>
