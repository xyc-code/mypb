<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>快速入口03</title>
  <link rel="stylesheet" type="text/css" href="css/index.css" />
  <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
  <script src="js/jquery-1.11.1.min.js"></script>
  <style type="text/css">
    .entrance{
      margin-top: 10px;
    }
    .entrance ul li{
      float:left;
      width: 20%;
      text-align: center;
      cursor: pointer;
    }
    .entrance ul li .img{
      margin-top: 10px;
      width: 100%;
      height: 50px;
      line-height: 50px;
      color:#6388FC;
      font-size: 32px;
    }
    .entrance ul li p{
      color:#333;
      font-size: 12px;
    }
    .entrance ul li:hover{
      opacity: .7;
    }
    .entrance02 ul li,
    .entrance03 ul li{
      margin-bottom: 20px;
    }
    .entrance02 ul li .img,
    .entrance03 ul li .img{
      width: 44px;
      height: 44px;
      line-height: 44px;
      font-size: 24px;
      margin:0 auto 6px;
      border-radius: 44px;
      background:#e0e8fe;
    }
    .entrance03 ul li .color01{
      background:#ebe6f8;
      color:#9c80da;
    }
    .entrance03 ul li .color02{
      background:#daf2e9;
      color:#45bf91;
    }
    .entrance03 ul li .color03{
      background:#fce0e0;
      color:#ee6666;
    }
    .entrance03 ul li .color04{
      background:#fef3d6;
      color:#fcc232;
    }
  </style>
</head>
<body>
  <div class="page-in box">
    <h2>
      <span>快速入口</span>
      <div class="toolbar">
        <a href="##" class="iconfont icon-edit-fill"></a>
<!--        <a href="##" class="iconfont icon-download"></a>-->
        <a href="##" class="iconfont icon-more"></a>
      </div>
    </h2>
    <div class="page-con">
      <div class="entrance entrance03">
        <ul>
          <li>
            <div class="img iconfont icon-plant-fill"></div>
            <p>分布统计</p>
          </li>
          <li>
            <div class="img color01 iconfont icon-calendar-fill"></div>
            <p>总调会管理</p>
          </li>
          <li>
            <div class="img color02 iconfont icon-file-fill"></div>
            <p>通行卡</p>
          </li>
          <li>
            <div class="img color03 iconfont icon-metting-fill"></div>
            <p>架次统计</p>
          </li>
          <li>
            <div class="img color04 iconfont icon-project-fill"></div>
            <p>员工信息</p>
          </li>
          <li>
            <div class="img color02 iconfont icon-alarm-fill"></div>
            <p>日程</p>
          </li>
          <li>
            <div class="img iconfont icon-email"></div>
            <p>知识库</p>
          </li>
          <li>
            <div class="img iconfont icon-telphone"></div>
            <p>人员名单</p>
          </li>
        </ul>
      </div>
    </div>
  </div>
</body>
</html>
