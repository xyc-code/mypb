<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>表格01</title>
  <link rel="stylesheet" type="text/css" href="css/index.css" />
  <script src="js/jquery-1.11.1.min.js"></script>
  <script src="js/jquery.page.js"></script>
  <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
  <link rel="stylesheet" href="css/page.css">
  <style type="text/css">
    .table-page{
      border: 1px solid #e9e9e9;
    }
    .table-page th{
      font-size: 12px;
      color:#333;
      height: 44px;
      background:#fafafa;
      border-bottom: 1px solid #e9e9e9;
      padding:0 0.5%;
    }
    .table-page td{
      padding:0 0.5%;
      height: 44px;
      line-height: 44px;
      font-size: 12px;
      color:#333;
      border-bottom: 1px solid #e9e9e9;
      font-weight: normal;
      text-align: center;
      overflow: hidden; 
      white-space: nowrap; 
      text-overflow: ellipsis;
    }
    .table-page tr:hover td{
      background:#fafafa;
    }
    .table-page .status{
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 14px;
      background:#FBD437;
    }
    .table-page .status02{
      background:#F2637B;
    }

  </style>
</head>
<body>
  <div class="page-in box">
    <h2>
      <span>服务点监控</span>
      <div class="toolbar">
<!--        <a href="##" class="iconfont icon-download" onclick="downloadFile('table')"></a>-->

    <div class="page-con">

        </colgroup>
        <tr>

          <th>状态</th>
          <th>服务点名称</th>
          <th>服务结束日期</th>
          <th>人员状态</th>

        <tr>

          <td>-</td>
          <td>-</td>
          <td>-</td>

        <tr>

          <td><a href="##" class="link">16</a></td>
        </tr>
        <tr>
          <td>3</td>
          <td><div class="status"></div></td>
          <td><a href="##" class="link">甘肃站点</a></td>
          <td>2021-5-25</td>
          <td>-</td>
          <td>-</td>

        </tr>
        <tr>
          <td>4</td>
          <td><div class="status"></div></td>
          <td><a href="##" class="link">服务点2服务点2</a></td>

          <td><a href="##" class="link">16</a></td>
          <td><a href="##" class="link">223</a></td>
          <td><a href="##" class="link">16</a></td>
        </tr>

          <td>-</td>

        </tr>

      <div class="tcdPageCode"></div>
    </div>
  </div>
  <script type="text/javascript">
    function downloadFile(fileName) {
      let a = document.createElement("a");
      a.href = "/download/template6/" + fileName + ".rar";
      a.download = fileName + ".rar";
      a.click();
    }
    $(".tcdPageCode").createPage({
        pageCount:6,
        current:1,
        backFn:function(p){
            console.log(p);
        }
    });
  </script>

</html>
