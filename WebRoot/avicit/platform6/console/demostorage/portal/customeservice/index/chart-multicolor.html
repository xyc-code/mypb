<!DOCTYPE html>
<html>
<head>

  <script src="js/echarts.min.js"></script>
  <style type="text/css">

  </style>

<body>
  <div class="page-in box">
    <h2>
      <span>机队和中心</span>
      <div class="toolbar">
        <dl class="select">
          <dt>选择操作</dt>
          <dd>
            <ul>
              <li><a href="#">操作一</a></li>
              <li><a href="#">操作二</a></li>
              <li><a href="#">操作三</a></li>
              <li><a href="#">操作四</a></li>
            </ul>
          </dd>
        </dl>
        <a href="##" class="button primary">搜索</a>
        <a href="##" class="button">清空</a>
<!--        <a href="##" class="iconfont icon-download"></a>-->
        <a href="##" class="iconfont icon-more"></a>

    </h2>
    <div class="page-con" id="main">
      <img src="images/chart01.png" alt="" />
    </div>
  </div>
</body>
<script>

</script>
<script type="text/javascript">
// 模拟下拉
  $(function(){
    $(".select").each(function(){
      var s=$(this);
      var z=parseInt(s.css("z-index"));
      var dt=$(this).children("dt");
      var dd=$(this).children("dd");
      var _show=function(){dd.slideDown(200);dt.addClass("cur");s.css("z-index",z+1);};   //展开效果
      var _hide=function(){dd.slideUp(200);dt.removeClass("cur");s.css("z-index",z);};    //关闭效果
      dt.click(function(){dd.is(":hidden")?_show():_hide();});
      dd.find("a").click(function(){dt.html($(this).html());_hide();});     //选择效果（如需要传值，可自定义参数，在此处返回对应的“value”值 ）
      $("body").click(function(i){ !$(i.target).parents(".select").first().is(s) ? _hide():"";});
    })
    $('sas').click(function(event) {
      /* Act on the event */
      $(this).addClass('class_name').substring().removeClass('')
    });
  })
</script>
<script>
var chartDom = document.getElementById('main');
var myChart = echarts.init(chartDom);

};
