<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>图表02</title>
  <link rel="stylesheet" type="text/css" href="css/index.css" />
  <link href="iconfont/iconfont.css" type="text/css" rel="stylesheet"/>
  <script src="js/jquery-1.11.1.min.js"></script>
  <script src="js/echarts.min.js"></script>
  <style type="text/css">

  </style>
</head>
<body>
  <div class="page-in box">
    <h2>
      <span>机型分布</span>
      <div class="toolbar">
        <label for="">用户名称:</label>
        <input type="text" placeholder="请输入用户名"/>
        <label for="">交付日期:</label>
        <input type="date" />
        <a href="##" class="button primary">搜索</a>
        <a href="##" class="button">清空</a>
<!--        <a href="##" class="iconfont icon-download"></a>-->
        <a href="##" class="iconfont icon-more"></a>
      </div>
    </h2>
    <div class="page-con" id="main">
      <!-- <img src="images/chart02.png" alt="" /> -->
    </div>
  </div>
</body>
<script type="text/javascript">
var chartDom = document.getElementById('main');
var myChart = echarts.init(chartDom);
var option;

option = {
    xAxis: {
        type: 'category',
        data: ['01', '02', '03', '04', '05', '06', '07', '08', '09', '10', '11', '12', '13']
    },
    yAxis: {
        type: 'value'
    },
    series: [{
        data: [120, 200, 150, 80, 70, 110, 130, 120, 200, 150, 80, 70, 110],
        type: 'bar'
    }]
};

option && myChart.setOption(option);

</script>
</html>
